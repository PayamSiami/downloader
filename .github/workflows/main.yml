name: AVASAM File Uploader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URLs (one per line)'
        required: true
        type: string
        default: ''
      password:
        description: 'Zip password (optional)'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Split size in MB (for large files)'
        required: false
        type: choice
        default: '95'
        options:
          - '10'
          - '25'
          - '50'
          - '95'
      delete_existing:
        description: 'Delete existing downloads before upload'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      # Step 1: Validate inputs
      - name: Check URL input
        id: validate
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ ERROR: No URLs provided"
            echo ""
            echo "📌 How to fix:"
            echo "   1️⃣ Click 'Run workflow'"
            echo "   2️⃣ Enter URLs (one per line)"
            echo "   3️⃣ Example:"
            echo "      https://example.com/file1.zip"
            echo "      https://example.com/file2.pdf"
            echo ""
            exit 1
          fi
          
          # Count URLs
          URL_COUNT=$(echo "${{ github.event.inputs.urls }}" | grep -v '^$' | wc -l)
          echo "✅ Found $URL_COUNT URL(s) to download"
          echo "url_count=$URL_COUNT" >> $GITHUB_OUTPUT

      # Step 2: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Step 3: Clean old files if requested
      - name: Clean existing downloads
        if: ${{ github.event.inputs.delete_existing == 'true' }}
        run: |
          echo "🧹 Cleaning old downloads..."
          rm -rf downloads/*
          git rm -rf downloads/ 2>/dev/null || true
          echo "✅ Cleanup complete"

      # Step 4: Configure git for large files
      - name: Configure Git
        run: |
          git config --global user.name "AVASAM Bot"
          git config --global user.email "bot@avasam.ir"
          git config --global http.postBuffer 524288000
          echo "✅ Git configured"

      # Step 5: Install tools
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl wget zip unzip bc
          echo "✅ Tools installed"

      # Step 6: Download files
      - name: Download files
        id: download
        run: |
          # Create directories
          mkdir -p downloads/temp
          cd downloads/temp
          
          # Process each URL
          echo "${{ github.event.inputs.urls }}" | grep -v '^$' > urls.txt
          
          SUCCESS=0
          FAILED=0
          TOTAL=$(wc -l < urls.txt)
          COUNTER=1
          DOWNLOADED_FILES=""
          
          while IFS= read -r url; do
            # Extract filename
            FILENAME=$(basename "$url" | cut -d'?' -f1 | sed 's/[^a-zA-Z0-9._-]/_/g')
            if [ -z "$FILENAME" ]; then
              FILENAME="file_${COUNTER}"
            fi
            
            echo ""
            echo "========================================="
            echo "[$COUNTER/$TOTAL] Downloading:"
            echo "URL: $url"
            echo "File: $FILENAME"
            echo "========================================="
            
            # Try download with curl
            if curl -L --fail --retry 3 --retry-delay 5 \
               --connect-timeout 30 --max-time 600 \
               --progress-bar -o "$FILENAME" "$url" 2>&1; then
              
              if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
                SIZE=$(du -h "$FILENAME" | cut -f1)
                echo "✅ SUCCESS: $FILENAME ($SIZE)"
                SUCCESS=$((SUCCESS + 1))
                DOWNLOADED_FILES="$DOWNLOADED_FILES $FILENAME"
              else
                echo "❌ FAILED: Downloaded file is empty"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ FAILED: Download error"
              FAILED=$((FAILED + 1))
            fi
            
            COUNTER=$((COUNTER + 1))
          done < urls.txt
          
          # Save results
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "downloaded_files=$DOWNLOADED_FILES" >> $GITHUB_OUTPUT
          
          echo ""
          echo "========================================="
          echo "DOWNLOAD SUMMARY:"
          echo "✅ Successful: $SUCCESS"
          echo "❌ Failed: $FAILED"
          echo "📊 Total: $TOTAL"
          echo "========================================="
          
          if [ "$SUCCESS" -eq 0 ]; then
            echo "No files downloaded successfully"
            exit 1
          fi

      # Step 7: Create archives
      - name: Create archives
        id: archive
        run: |
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          PASSWORD="${{ github.event.inputs.password }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_DIR="downloads/$TIMESTAMP"
          mkdir -p "$OUTPUT_DIR"
          
          echo "📁 Output directory: $OUTPUT_DIR"
          echo "📦 Split size: ${SPLIT_SIZE}MB"
          echo "🔐 Password: $([ -n "$PASSWORD" ] && echo "Enabled" || echo "Disabled")"
          
          cd downloads/temp
          PROCESSED=0
          
          for file in *; do
            if [ -f "$file" ]; then
              PROCESSED=$((PROCESSED + 1))
              BASENAME="${file%.*}"
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              echo ""
              echo "📦 Processing [$PROCESSED]: $file (${SIZE_MB}MB)"
              
              # Create folder for this file
              FILE_DIR="$OUTPUT_DIR/$BASENAME"
              mkdir -p "$FILE_DIR"
              
              # Create archive based on size
              if [ "$SIZE_MB" -gt "$SPLIT_SIZE" ]; then
                echo "   File is large, splitting into ${SPLIT_SIZE}MB chunks..."
                
                if [ -n "$PASSWORD" ]; then
                  7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_SIZE}m "$FILE_DIR/$BASENAME.7z" "$file" > /dev/null 2>&1
                else
                  7z a -mx=3 -v${SPLIT_SIZE}m "$FILE_DIR/$BASENAME.7z" "$file" > /dev/null 2>&1
                fi
                
                # Rename single chunk if needed
                if [ -f "$FILE_DIR/$BASENAME.7z.001" ] && [ ! -f "$FILE_DIR/$BASENAME.7z.002" ]; then
                  mv "$FILE_DIR/$BASENAME.7z.001" "$FILE_DIR/$BASENAME.7z"
                  echo "   ✅ Created single archive"
                else
                  echo "   ✅ Created split archive (multiple parts)"
                fi
              else
                echo "   Creating standard archive..."
                
                if [ -n "$PASSWORD" ]; then
                  7z a -p"$PASSWORD" -mhe=on -mx=3 "$FILE_DIR/$BASENAME.7z" "$file" > /dev/null 2>&1
                else
                  7z a -mx=3 "$FILE_DIR/$BASENAME.7z" "$file" > /dev/null 2>&1
                fi
                
                echo "   ✅ Created archive"
              fi
              
              # Create README for this file
              cat > "$FILE_DIR/README.md" << 'EOF'
# Download Information

## File Details
| Property | Value |
|----------|-------|
| **Original File** | `FILENAME_PLACEHOLDER` |
| **Size** | SIZE_PLACEHOLDER MB |
| **Format** | 7-Zip Archive |
| **Password** | PASSWORD_PLACEHOLDER |

## How to Download

### For single file:
```bash
wget DOWNLOAD_URL_PLACEHOLDER
